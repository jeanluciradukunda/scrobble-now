  <text x="331" y="631" class="pill">5 SOURCE DISCOVERY</text>
  <text x="573" y="631" class="pill">PNG COLLAGES</text>

  <g>
    <rect x="778" y="118" width="214" height="116" rx="22" fill="#FFF9EC" stroke="#D7C7A7"/>
