      <stop offset="1" stop-color="#F0E6D4"/>
    </linearGradient>
    <linearGradient id="heroGlow" x1="770" y1="140" x2="1280" y2="620" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF6DA"/>
      <stop offset="1" stop-color="#F2DDAD"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1400" height="760" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
