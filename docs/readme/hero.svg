  <rect x="96" y="110" width="428" height="38" rx="19" fill="#F6E6BE"/>
  <text x="120" y="136" class="eyebrow">MACOS MENU BAR COMPANION FOR LAST.FM</text>

  <text x="104" y="242" class="headline">Listen live.</text>
  <text x="104" y="324" class="headline">Discover deeply.</text>
  <text x="104" y="406" class="headline">Share beautifully.</text>

  <text x="108" y="484" class="body">
    <tspan x="108" dy="0">Track your now playing state, browse your history,</tspan>
    <tspan x="108" dy="38">merge album details from five music sources,</tspan>
    <tspan x="108" dy="38">and export collage-ready grids from the menu bar.</tspan>
  </text>

  <rect x="106" y="594" width="176" height="58" rx="29" fill="#F6E6BE"/>
  <rect x="298" y="594" width="222" height="58" rx="29" fill="#D4E0FF"/>
