    <text x="806" y="190" class="cardTitle">Live feed</text>
    <text x="806" y="216" class="cardBody">Recent scrobbles, loved tracks,</text>
    <text x="806" y="236" class="cardBody">and now playing state.</text>
  </g>

  <g>
    <rect x="1144" y="496" width="188" height="118" rx="22" fill="#FFF9EC" stroke="#D7C7A7"/>
    <text x="1170" y="534" class="small">EXPORT</text>
    <text x="1170" y="568" class="cardTitle">Collages</text>
    <text x="1170" y="594" class="cardBody">3x3 to 10x10 grids,</text>
    <text x="1170" y="614" class="cardBody">PNG or clipboard.</text>
  </g>

  <g>
    <rect x="824" y="502" width="228" height="122" rx="22" fill="#FFF9EC" stroke="#D7C7A7"/>
    <text x="852" y="540" class="small">DASHBOARD</text>
