      .small { fill: #6F604A; font-family: monospace; font-size: 15px; font-weight: 700; letter-spacing: 0.12em; }
      .cardTitle { fill: #1E1812; font-family: sans-serif; font-size: 22px; font-weight: 700; }
      .cardBody { fill: #5B5145; font-family: sans-serif; font-size: 16px; font-weight: 400; }
