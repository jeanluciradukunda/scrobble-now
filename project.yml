name: ScrobbleNow
options:
  bundleIdPrefix: com.personal
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  ScrobbleNow:
    type: application
    platform: macOS
    sources:
      - path: ScrobbleNow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.personal.ScrobbleNow
        INFOPLIST_FILE: ""
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        PRODUCT_NAME: "Scrobble Now"
        CODE_SIGN_ENTITLEMENTS: ScrobbleNow/Resources/ScrobbleNow.entitlements
        COMBINE_HIDPI_IMAGES: YES
    info:
      path: ScrobbleNow/Resources/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: "Scrobble Now"
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
