name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    environment: production
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_OUTPUT
            echo "TAG=v${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
            echo "TAG=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Create tag (if manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git tag "v${{ inputs.version }}" || true
          git push origin "v${{ inputs.version }}" || true

      - name: Generate Xcode project
        run: |
          brew install xcodegen || true
          xcodegen generate

      - name: Create dummy Secrets.plist
        run: |
          cp ScrobbleNow/Resources/Secrets.example.plist ScrobbleNow/Resources/Secrets.plist

      - name: Set version in project.yml
        run: |
          sed -i '' "s/MARKETING_VERSION: .*/MARKETING_VERSION: \"${{ steps.version.outputs.VERSION }}\"/" project.yml
          xcodegen generate

      - name: Archive
        run: |
          xcodebuild \
            -scheme ScrobbleNow \
            -configuration Release \
            -archivePath ${{ runner.temp }}/ScrobbleNow.xcarchive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            archive

      - name: Export app
        run: |
          mkdir -p ${{ runner.temp }}/export
          cp -R "${{ runner.temp }}/ScrobbleNow.xcarchive/Products/Applications/Scrobble Now.app" \
            "${{ runner.temp }}/export/Scrobble Now.app"

      - name: Create DMG
        run: |
          brew install create-dmg || true
          create-dmg \
            --volname "Scrobble Now ${{ steps.version.outputs.VERSION }}" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Scrobble Now.app" 150 190 \
            --app-drop-link 450 190 \
            --hide-extension "Scrobble Now.app" \
            "${{ runner.temp }}/ScrobbleNow-${{ steps.version.outputs.VERSION }}.dmg" \
            "${{ runner.temp }}/export/" || true

          # Fallback if create-dmg fails
          if [ ! -f "${{ runner.temp }}/ScrobbleNow-${{ steps.version.outputs.VERSION }}.dmg" ]; then
            hdiutil create \
              -volname "Scrobble Now ${{ steps.version.outputs.VERSION }}" \
              -srcfolder "${{ runner.temp }}/export/" \
              -ov -format UDZO \
              "${{ runner.temp }}/ScrobbleNow-${{ steps.version.outputs.VERSION }}.dmg"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: Scrobble Now v${{ steps.version.outputs.VERSION }}
          body: |
            ## Scrobble Now v${{ steps.version.outputs.VERSION }}

            macOS menu bar companion for Last.fm listening visualization.

            ### Install
            1. Download `ScrobbleNow-${{ steps.version.outputs.VERSION }}.dmg` below
            2. Open the DMG and drag **Scrobble Now** to Applications
            3. **First launch**: right-click the app → Open → Open (bypasses Gatekeeper)
            4. Look for the icon in your menu bar

            > **Note:** The app is unsigned. The macOS security prompt is expected and safe to bypass.

            **Requires macOS 14.0 Sonoma or later.**
          files: |
            ${{ runner.temp }}/ScrobbleNow-${{ steps.version.outputs.VERSION }}.dmg
          draft: false
          prerelease: false
