name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    environment: production
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_OUTPUT
            echo "TAG=v${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
            echo "TAG=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Create tag (if manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git tag "v${{ inputs.version }}" || true
          git push origin "v${{ inputs.version }}" || true

      - name: Generate Xcode project
        run: |
          brew install xcodegen || true
          xcodegen generate

      - name: Create dummy Secrets.plist
        run: |
          cp ScrobbleNow/Resources/Secrets.example.plist ScrobbleNow/Resources/Secrets.plist

      - name: Set version in project.yml
        run: |
          sed -i '' "s/MARKETING_VERSION: .*/MARKETING_VERSION: \"${{ steps.version.outputs.VERSION }}\"/" project.yml
          xcodegen generate

      # ---------- Code Signing Setup ----------
      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=${{ runner.temp }}/certificate.p12
          printf '%s' "$CERTIFICATE_BASE64" | base64 -D > "$CERTIFICATE_PATH"

          KEYCHAIN_PATH=${{ runner.temp }}/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -A \
            -t agg \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      # ---------- Build & Sign ----------
      - name: Archive
        run: |
          xcodebuild \
            -scheme ScrobbleNow \
            -configuration Release \
            -archivePath ${{ runner.temp }}/ScrobbleNow.xcarchive \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            CODE_SIGN_STYLE=Manual \
            OTHER_CODE_SIGN_FLAGS="--options runtime" \
            archive

      - name: Export app
        run: |
          mkdir -p ${{ runner.temp }}/export
          cp -R "${{ runner.temp }}/ScrobbleNow.xcarchive/Products/Applications/Scrobble Now.app" \
            "${{ runner.temp }}/export/Scrobble Now.app"

      - name: Re-sign all embedded binaries
        run: |
          APP_PATH="${{ runner.temp }}/export/Scrobble Now.app"
          SIGN_ID="Developer ID Application"

          cat > "${{ runner.temp }}/release.entitlements" << 'ENTITLEMENTS'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>com.apple.security.app-sandbox</key><false/>
          </dict></plist>
          ENTITLEMENTS

          find "$APP_PATH" -type f -print0 | while IFS= read -r -d '' f; do
            if file "$f" | grep -q "Mach-O"; then
              codesign --force --options runtime --timestamp \
                --entitlements "${{ runner.temp }}/release.entitlements" \
                --sign "$SIGN_ID" "$f"
            fi
          done

          find "$APP_PATH/Contents/Frameworks" -name "*.app" -type d -print0 2>/dev/null | while IFS= read -r -d '' app; do
            codesign --force --deep --options runtime --timestamp \
              --entitlements "${{ runner.temp }}/release.entitlements" \
              --sign "$SIGN_ID" "$app"
          done

          find "$APP_PATH/Contents/Frameworks" -name "*.framework" -type d -print0 2>/dev/null | while IFS= read -r -d '' fw; do
            codesign --force --deep --options runtime --timestamp \
              --sign "$SIGN_ID" "$fw"
          done

          find "$APP_PATH" -name "*.dylib" -type f -print0 2>/dev/null | while IFS= read -r -d '' lib; do
            codesign --force --options runtime --timestamp \
              --sign "$SIGN_ID" "$lib"
          done

          codesign --force --deep --options runtime --timestamp \
            --entitlements "${{ runner.temp }}/release.entitlements" \
            --sign "$SIGN_ID" "$APP_PATH"

      - name: Verify signature
        run: |
          codesign --verify --deep --strict --verbose=2 "${{ runner.temp }}/export/Scrobble Now.app"

      # ---------- Notarization ----------
      - name: Create DMG
        run: |
          brew install create-dmg || true
          create-dmg \
            --volname "Scrobble Now ${{ steps.version.outputs.VERSION }}" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Scrobble Now.app" 150 190 \
            --app-drop-link 450 190 \
            --hide-extension "Scrobble Now.app" \
            "${{ runner.temp }}/ScrobbleNow-${{ steps.version.outputs.VERSION }}.dmg" \
            "${{ runner.temp }}/export/" || true

          if [ ! -f "${{ runner.temp }}/ScrobbleNow-${{ steps.version.outputs.VERSION }}.dmg" ]; then
            hdiutil create \
              -volname "Scrobble Now ${{ steps.version.outputs.VERSION }}" \
              -srcfolder "${{ runner.temp }}/export/" \
              -ov -format UDZO \
              "${{ runner.temp }}/ScrobbleNow-${{ steps.version.outputs.VERSION }}.dmg"
          fi

      - name: Sign DMG
        run: |
          codesign --force --timestamp --sign "Developer ID Application" \
            "${{ runner.temp }}/ScrobbleNow-${{ steps.version.outputs.VERSION }}.dmg"

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG_PATH="${{ runner.temp }}/ScrobbleNow-${{ steps.version.outputs.VERSION }}.dmg"

          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --output-format json \
            --wait > notarize_result.json 2>&1 || true

          cat notarize_result.json

          SUBMISSION_ID=$(python3 -c "import json; print(json.load(open('notarize_result.json'))['id'])" 2>/dev/null || echo "")
          STATUS=$(python3 -c "import json; print(json.load(open('notarize_result.json'))['status'])" 2>/dev/null || echo "unknown")

          if [ "$STATUS" = "Accepted" ]; then
            echo "Notarization accepted"
          else
            echo "Notarization failed (status: $STATUS)"
            if [ -n "$SUBMISSION_ID" ]; then
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_ID_PASSWORD" \
                --team-id "$APPLE_TEAM_ID" \
                > developer_log.json 2>&1 || true
              cat developer_log.json
            fi
            exit 1
          fi

          xcrun stapler staple "$DMG_PATH"

      # ---------- Cleanup & Release ----------
      - name: Clean up keychain
        if: always()
        run: security delete-keychain ${{ runner.temp }}/signing.keychain-db 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: Scrobble Now v${{ steps.version.outputs.VERSION }}
          body: |
            ## Scrobble Now v${{ steps.version.outputs.VERSION }}

            macOS menu bar companion for Last.fm listening visualization.

            ### Install
            1. Download `ScrobbleNow-${{ steps.version.outputs.VERSION }}.dmg` below
            2. Open the DMG and drag **Scrobble Now** to Applications
            3. Launch Scrobble Now and enter your Last.fm username in settings

            **Signed and notarized with Apple Developer ID.** Requires macOS 14.0 Sonoma or later.
          files: |
            ${{ runner.temp }}/ScrobbleNow-${{ steps.version.outputs.VERSION }}.dmg
          draft: false
          prerelease: false
