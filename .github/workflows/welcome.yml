name: Welcome

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            Thanks for opening your first issue! We appreciate you taking the time to report this.

            If this is a bug, please include:
            - macOS version
            - Steps to reproduce
            - Expected vs actual behavior

            If this is a feature request, describe the use case and how it fits into the Scrobble Now workflow (Last.fm API integration, listening visualization, album art discovery, or collage generation).
          pr-message: |
            Thanks for your first pull request!

            Please make sure:
            - [ ] The build passes (`xcodegen generate && xcodebuild`)
            - [ ] SwiftLint has no new warnings
            - [ ] You've tested the change manually
            - [ ] `Secrets.plist` is NOT included in your changes (contains Last.fm API keys)

            A maintainer will review this shortly.
